<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1BUSKET | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            overflow: hidden; position: relative;
        }
        .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
        .bg-orb-1 { width:500px;height:500px;background:radial-gradient(circle,rgba(255,117,31,0.15) 0%,transparent 70%);top:-150px;right:-100px; }
        .bg-orb-2 { width:400px;height:400px;background:radial-gradient(circle,rgba(255,117,31,0.08) 0%,transparent 70%);bottom:-100px;left:-80px; }
        .bg-orb-3 { width:300px;height:300px;background:radial-gradient(circle,rgba(88,86,214,0.1) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%); }
        .bg-grid {
            position:fixed;inset:0;
            background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
            background-size:48px 48px;pointer-events:none;z-index:0;
        }
        #loginCard {
            position:relative;z-index:1;
            background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);
            border-radius:32px;
            box-shadow:0 25px 50px -12px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.08);
            padding:52px 44px;width:100%;max-width:420px;
            text-align:center;
            animation:cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes cardIn { from{opacity:0;transform:translateY(32px) scale(0.94);}to{opacity:1;transform:translateY(0) scale(1);} }
        .login-logo {
            width:88px;height:88px;
            background:linear-gradient(135deg,#ff751f,#e0621a);
            border-radius:24px;display:flex;align-items:center;justify-content:center;
            margin:0 auto 24px;box-shadow:0 10px 30px rgba(255,117,31,0.4);
            transition:transform 0.3s ease;
        }
        .login-logo:hover { transform:scale(1.05) rotate(-2deg); }
        .login-logo img { height:56px;width:auto;object-fit:contain; }
        .login-title { font-size:2.6rem;font-weight:800;letter-spacing:-2px;color:#1d1d1f;margin-bottom:6px;line-height:1; }
        .login-title span { color:#ff751f; }
        .login-subtitle { font-size:1rem;color:#64748b;margin-bottom:36px;font-weight:500; }
        .google-btn {
            background:#ff751f;color:white;border:none;
            padding:17px 28px;border-radius:9999px;
            font-family:'Inter',sans-serif;font-weight:700;font-size:1rem;
            display:flex;align-items:center;justify-content:center;gap:14px;
            width:100%;cursor:pointer;
            box-shadow:0 8px 24px rgba(255,117,31,0.45);
            transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        .google-btn:hover:not(:disabled){transform:translateY(-3px);box-shadow:0 16px 36px rgba(255,117,31,0.55);background:#e0621a;}
        .google-btn:active:not(:disabled){transform:translateY(0);}
        .google-btn:disabled{opacity:0.65;cursor:not-allowed;transform:none;}
        .google-btn img{height:26px;width:auto;border-radius:4px;}
        .login-error {
            background:#fff1f0;border:1px solid #fcd9d7;border-radius:12px;
            padding:11px 14px;color:#d93025;font-size:0.84rem;font-weight:600;
            display:none;margin-bottom:16px;text-align:left;
        }
        .login-footer {
            margin-top:28px;font-size:0.82rem;color:#94a3b8;
            display:flex;align-items:center;justify-content:center;gap:8px;
        }
        .login-footer::before,.login-footer::after{content:'';display:block;width:24px;height:1.5px;}
        .login-footer::before{background:linear-gradient(to right,transparent,#cbd5e1);}
        .login-footer::after{background:linear-gradient(to left,transparent,#cbd5e1);}
        .login-fine{margin-top:14px;font-size:0.77rem;color:#94a3b8;line-height:1.55;}
        @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
        .spin{animation:spin 0.8s linear infinite;display:inline-flex;}
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<div id="loginCard">
    <div class="login-logo">
        <img src="https://i.postimg.cc/X7WWgSdF/WHILTE-LOGO-1BUSKET.png" alt="1BUSKET">
    </div>
    <h1 class="login-title">1<span>BUSKET</span></h1>
    <p class="login-subtitle">Secure Admin Dashboard</p>
    <div class="login-error" id="loginError"></div>
    <button onclick="signInWithGoogle()" class="google-btn" id="googleBtn">
        <img src="https://i.postimg.cc/N0TsCcsh/download-jj-removebg-preview.png" alt="Google">
        Continue with Google
    </button>
    <div class="login-footer">
        <i data-lucide="shield-check" style="width:14px;height:14px;"></i>
        Protected by Google · Admin only
    </div>
    <p class="login-fine">Only verified administrators can access the control panel.</p>
</div>

<script>
lucide.createIcons();

const firebaseConfig = {
    apiKey: "AIzaSyCh7Ute6LeSAxcNDEQwZg5m0cA4ujnLCfg",
    authDomain: "test-17881.firebaseapp.com",
    projectId: "test-17881",
    storageBucket: "test-17881.firebasestorage.app",
    messagingSenderId: "1057428047643",
    appId: "1:1057428047643:web:f3801c0d933225a5cd35be",
    databaseURL: "https://test-17881-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// If already signed in, go directly to dashboard
auth.onAuthStateChanged(user => {
    if (user) {
        window.location.href = 'index.html';
    }
});

function showError(msg) { 
    const el = document.getElementById('loginError'); 
    el.textContent = msg; 
    el.style.display = 'block'; 
}
function hideError() { 
    document.getElementById('loginError').style.display = 'none'; 
}

async function signInWithGoogle() {
    const btn = document.getElementById('googleBtn');
    hideError();
    btn.disabled = true;
    btn.innerHTML = `<span class="spin"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></span> Signing in…`;

    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });

    try {
        await auth.signInWithPopup(provider);
        // Redirect handled by onAuthStateChanged
    } catch (e) {
        btn.disabled = false;
        btn.innerHTML = `<img src="https://i.postimg.cc/N0TsCcsh/download-jj-removebg-preview.png" alt="Google" style="height:26px;"> Continue with Google`;
        let msg = e.message || 'Google sign-in failed. Please try again.';
        if (e.code === 'auth/popup-closed-by-user')   msg = 'Sign-in window was closed. Please try again.';
        if (e.code === 'auth/popup-blocked')           msg = 'Pop-up blocked. Please allow pop-ups for this site.';
        if (e.code === 'auth/cancelled-popup-request') msg = 'Another sign-in is already in progress.';
        if (e.code === 'auth/network-request-failed')  msg = 'Network error. Check your connection and try again.';
        showError(msg);
    }
}
</script>
</body>
</html>
